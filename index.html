<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor de Altura Offline</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .live-angle {
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        button:active { background-color: #218838; }
        .btn-sensor {
            background-color: #007bff;
        }
        .btn-sensor:active { background-color: #0056b3; }
        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            border-top: 2px dashed #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Medidor de Alturas v2 🌲</h1>
    
    <div class="input-group">
        <label for="distancia">Distancia al Objeto (metros):</label>
        <input type="number" id="distancia" value="10" step="0.1">
    </div>

    <div class="input-group">
        <label for="alturaOjos">Altura de tus Ojos (metros):</label>
        <input type="number" id="alturaOjos" value="1.60" step="0.01">
    </div>

    <button class="btn-sensor" id="btnPermiso" onclick="solicitarPermiso()">Conectar Giroscopio</button>

    <div class="live-angle">
        Ángulo Actual: <span id="lblAngulo">0°</span>
    </div>

    <button onclick="calcularAltura()">Congelar y Calcular</button>

    <div class="result" id="resultado">
        Altura Estimada: -- m
    </div>
</div>

<script>
    let anguloInclinacion = 0;

    // Forzar actualización eliminando cachés antiguas de versiones previas
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=2').then(reg => {
            reg.update();
            console.log("Service Worker Actualizado.");
        });
    }

    function manejarOrientacion(event) {
        let beta = event.beta; 
        if (beta !== null) {
            // Conversión matemática exacta para medir inclinaciones en vertical
            anguloInclinacion = Math.abs(beta - 90); 
            document.getElementById('lblAngulo').innerText = Math.round(anguloInclinacion) + "°";
        }
    }

    function solicitarPermiso() {
        // Validación obligatoria para compatibilidad con sistemas modernos
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', manejarOrientacion, true);
                        /document.getElementById('btnPermiso').innerText = "¡Sensores Listos!";
                    }
                }).catch(console.error);
        } else {
            // Solución definitiva para Android: Escuchar orientaciones absolutas y normales alternativamente
            window.addEventListener('deviceorientation', manejarOrientacion, true);
            window.addEventListener('deviceorientationabsolute', manejarOrientacion, true);
            
            document.getElementById('btnPermiso').innerText = "¡Sensores Conectados!";
            document.getElementById('btnPermiso').style.backgroundColor = "#6c757d";
        }
    }

    function calcularAltura() {
        const D = parseFloat(document.getElementById('distancia').value);
        const h = parseFloat(document.getElementById('alturaOjos').value);
        
        const anguloRadianes = anguloInclinacion * (Math.PI / 180);
        const H = (D * Math.tan(anguloRadianes)) + h;

        if (!isNaN(H)) {
            document.getElementById('resultado').innerText = "Altura Estimada: " + H.toFixed(2) + " m";
        } else {
            document.getElementById('resultado').innerText = "Revisa los datos introducidos.";
        }
    }
</script>

</body>
</html>
